# Copy this file to config.yaml and fill in your own values.
# config.yaml is gitignored and should never be committed.

watchlist_teams:
  - Vitality
  - G2
  - FaZe
  - Spirit

hltv_top_n: 30

hltv:
  base_url: "https://www.hltv.org"
  headless: true
  news_limit: 20
  results_pages: 1
  request_timeout_seconds: 30
  min_request_interval_seconds: 2.0
  watchlist_only_matches: false
  upcoming_enabled: true
  upcoming_lookahead_hours: 36
  upcoming_max_matches: 8

youtube:
  api_key_env: "YOUTUBE_API_KEY"
  channels:
    - id: "UC_SgBkrOEFVnJkBMKcpp5lg"
      name: "HLTV"

podcasts:
  - name: "HLTV Confirmed"
    feed_url: "https://anchor.fm/s/8bb1860/podcast/rss"

reddit:
  subreddit: "GlobalOffensive"
  sort: "top"
  time_filter: "day"
  limit: 10
  flair_filter:
    - "Highlight"
    - "Clip"
  # Required. Reddit requires a descriptive User-Agent identifying your app.
  # Format: "<appname>:<version> (by /u/<your-reddit-username>)"
  user_agent: "overpass:v0.1.0 (by /u/your-reddit-username)"

live_alerts:
  watchlist_match_live: true
  valve_patch: true
  roster_moves: true
  tournament_stage_change: true

llm:
  default_provider: "gemini"
  providers:
    gemini:
      model: "gemini-2.5-flash"
      api_key_env: "GEMINI_API_KEY"
    claude:
      model: "claude-sonnet-4-20250514"
      api_key_env: "ANTHROPIC_API_KEY"

telegram:
  bot_token_env: "TELEGRAM_BOT_TOKEN"
  chat_id_env: "TELEGRAM_CHAT_ID"

schedule:
  daily_digest: "07:00"
  live_poll_interval_minutes: 5

timezone: "Europe/Berlin"

liquipedia:
  base_url: "https://liquipedia.net/counterstrike"
  api_url: "https://liquipedia.net/counterstrike/api.php"
  contact: "your-email@example.com"  # Required. Your contact email, used in the Liquipedia API User-Agent.
  user_agent: "overpass/0.1.0 (+https://github.com/your-github-username/overpass; {contact})"  # Required. {contact} is replaced with the contact value above.
  min_request_interval_seconds: 2.0
  request_timeout_seconds: 30
  cache_dir: ".cache/liquipedia"
  cache_ttl_minutes: 30
  hltv_fallback: true
  upcoming_matches:
    enabled: false
    lookahead_hours: 36
  transfers:
    enabled: false
    lookback_hours: 48

social:
  # Disabled by default: as of 2026-04, every public Nitter mirror is either
  # gated behind Cloudflare/Anubis bot challenges (poast.org, lightbrd.com,
  # nitter.space, nitter.tiekoetter.com) or behind reader-whitelisting
  # (xcancel.com → rss.xcancel.com). Re-enable once a working mirror exists,
  # you self-host Nitter, or you swap in a different backend.
  enabled: false
  lookback_hours: 24
  max_per_handle: 5
  max_total_posts: 12
  request_timeout_seconds: 8
  skip_retweets: true
  skip_replies: true
  cache_dir: ".cache/nitter"
  # Required. Identifies your instance to Nitter mirrors.
  # Format: "<appname>/<version> (+https://github.com/your-github-username/overpass)"
  user_agent: "overpass/0.1.0 (+https://github.com/your-github-username/overpass)"
  instances:
    - "xcancel.com"
    - "nitter.poast.org"
    - "nitter.privacyredirect.com"
    - "lightbrd.com"
    - "nitter.space"
    - "nitter.tiekoetter.com"
  handles:
    - handle: "s1mpleO"
      display_name: "s1mple"
    - handle: "ZywOo"
      display_name: "ZywOo"
    - handle: "donk_s1"
      display_name: "donk"
    - handle: "device"
      display_name: "device"
    - handle: "ropz"
      display_name: "ropz"
