watchlist_teams:
  - Vitality
  - G2
  - FaZe
  - Spirit

hltv_top_n: 30

hltv:
  base_url: "https://www.hltv.org"
  headless: true
  news_limit: 20
  results_pages: 1
  request_timeout_seconds: 30
  min_request_interval_seconds: 2.0
  watchlist_only_matches: false

youtube:
  api_key_env: "YOUTUBE_API_KEY"
  channels:
    - id: "UC_SgBkrOEFVnJkBMKcpp5lg"
      name: "HLTV"

podcasts:
  - name: "HLTV Confirmed"
    feed_url: "https://feeds.simplecast.com/j_vFR3oS"
  - name: "Dust2 Podcast"
    feed_url: "https://example.com/dust2.xml"

reddit:
  subreddit: "GlobalOffensive"
  sort: "top"
  time_filter: "day"
  limit: 10
  flair_filter:
    - "Highlight"
    - "Clip"
  client_id_env: "REDDIT_CLIENT_ID"
  client_secret_env: "REDDIT_CLIENT_SECRET"
  user_agent: "overpass:v0.1.0 (by /u/overpass-bot)"

live_alerts:
  watchlist_match_live: true
  valve_patch: true
  roster_moves: true
  tournament_stage_change: true

llm:
  default_provider: "gemini"
  providers:
    gemini:
      model: "gemini-2.5-flash"
      api_key_env: "GEMINI_API_KEY"
    claude:
      model: "claude-sonnet-4-20250514"
      api_key_env: "ANTHROPIC_API_KEY"

telegram:
  bot_token_env: "TELEGRAM_BOT_TOKEN"
  chat_id_env: "TELEGRAM_CHAT_ID"

schedule:
  daily_digest: "07:00"
  live_poll_interval_minutes: 5

timezone: "Europe/Berlin"

liquipedia:
  base_url: "https://liquipedia.net/counterstrike"
  api_url: "https://liquipedia.net/counterstrike/api.php"
  contact: "63104033+lindhammer@users.noreply.github.com"
  user_agent: "overpass/0.1.0 (+https://github.com/lindhammer/overpass; {contact})"
  min_request_interval_seconds: 2.0
  request_timeout_seconds: 30
  cache_dir: ".cache/liquipedia"
  cache_ttl_minutes: 30
  hltv_fallback: true
  upcoming_matches:
    enabled: false
    lookahead_hours: 36
  transfers:
    enabled: false
    lookback_hours: 48
