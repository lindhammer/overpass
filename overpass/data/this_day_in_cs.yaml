# Curated "This Day in CS" entries, keyed by zero-padded MM-DD.
# Each bucket has one `primary` entry rendered in the briefing; `alternatives`
# is a free-form list reserved for future rotation logic.
# Year must be >= 1999. Headline + narrative are required. visual_label is
# the short watermark (falls back to the year). source_url is optional.

"01-31":
  primary:
    year: 2016
    headline: "Astralis is founded as a player-owned org"
    narrative: |
      The TSM CS:GO roster (dev1ce, dupreeh, Xyp9x, Kjaerbye, karrigan)
      formally launches Astralis as a player-owned organisation, setting
      up what would become the most decorated lineup in the game's history.
    visual_label: "AST '16"
    source_url: "https://liquipedia.net/counterstrike/Astralis"
  alternatives: []

"03-16":
  primary:
    year: 2014
    headline: "Virtus.pro win EMS One Katowice"
    narrative: |
      Virtus.pro lift the trophy at the first CS:GO Major, EMS One Katowice,
      kicking off the Polish dynasty era and the modern Major circuit.
    visual_label: "KAT '14"
    source_url: "https://liquipedia.net/counterstrike/EMS/One/Katowice/2014"
  alternatives: []

"03-04":
  primary:
    year: 2018
    headline: "Cloud9 win the ELEAGUE Boston Major"
    narrative: |
      Cloud9 become the first North American team to win a CS:GO Major,
      beating FaZe 2-1 in Boston after a triple-overtime Inferno decider.
    visual_label: "BOS '18"
    source_url: "https://liquipedia.net/counterstrike/ELEAGUE/Major/2018"
  alternatives: []

"04-04":
  primary:
    year: 2014
    headline: "Operation Bravo introduces the workshop pipeline"
    narrative: |
      Valve ships Operation Bravo, the first sustained run of community-built
      maps in CS:GO matchmaking and the template every later Operation
      followed.
    visual_label: "OP BRV"
    source_url: "https://liquipedia.net/counterstrike/Operation_Bravo"
  alternatives: []

"04-07":
  primary:
    year: 2024
    headline: "NaVi win PGL Major Copenhagen"
    narrative: |
      Natus Vincere take the first CS2 Major, beating FaZe 2-0 in the
      Copenhagen final and confirming the new engine had a competitive
      apex worth chasing.
    visual_label: "CPH '24"
    source_url: "https://liquipedia.net/counterstrike/PGL/Major/2024/Copenhagen"
  alternatives: []

"05-21":
  primary:
    year: 2023
    headline: "Vitality win the BLAST.tv Paris Major"
    narrative: |
      Vitality beat GamerLegion 2-0 in Paris, closing out the final CS:GO
      Major and giving ZywOo his first Major trophy on home soil.
    visual_label: "PAR '23"
    source_url: "https://liquipedia.net/counterstrike/BLAST/Major/2023/Paris"
  alternatives: []

"06-08":
  primary:
    year: 2017
    headline: "Gambit win the PGL Krakow Major"
    narrative: |
      Gambit upset Immortals 2-1 in the Krakow final, the last European
      Major before the North American Boston run and the high-water mark
      of the CIS scene's first wave.
    visual_label: "KRK '17"
    source_url: "https://liquipedia.net/counterstrike/PGL/Major/2017/Krakow"
  alternatives: []

"07-05":
  primary:
    year: 2015
    headline: "Fnatic win ESL One Cologne"
    narrative: |
      Fnatic beat EnVyUs 2-1 in the Cologne final, a series remembered
      both for the championship and for the controversial Olofmeister
      boost on Overpass.
    visual_label: "CGN '15"
    source_url: "https://liquipedia.net/counterstrike/ESL/One/Cologne/2015"
  alternatives: []

"07-22":
  primary:
    year: 2018
    headline: "Astralis complete the Intel Grand Slam"
    narrative: |
      Astralis win FACEIT London, sealing the first ever Intel Grand Slam
      and cementing their 2018-19 dynasty as the strongest in CS history.
    visual_label: "GS '18"
    source_url: "https://liquipedia.net/counterstrike/FACEIT/Major/2018/London"
  alternatives: []

"08-12":
  primary:
    year: 2012
    headline: "Counter-Strike: Global Offensive ships"
    narrative: |
      Valve releases CS:GO on Windows, OS X, Xbox 360, and PS3, replacing
      Source as the competitive entry and starting the decade-plus run
      this dataset chronicles.
    visual_label: "CS:GO"
    source_url: "https://liquipedia.net/counterstrike/Counter-Strike:_Global_Offensive"
  alternatives: []

"09-27":
  primary:
    year: 2023
    headline: "Counter-Strike 2 launches"
    narrative: |
      CS2 ships as a free upgrade to CS:GO, replacing it overnight on
      Steam and bringing the Source 2 engine, sub-tick networking, and
      the volumetric smoke rework to competitive play.
    visual_label: "CS2"
    source_url: "https://liquipedia.net/counterstrike/Counter-Strike_2"
  alternatives: []

"10-30":
  primary:
    year: 2016
    headline: "Astralis win their first Major in Atlanta"
    narrative: |
      Astralis beat Virtus.pro 2-1 at ELEAGUE Atlanta to claim their
      first Major trophy, a result that reframed the Danish project
      from contender to era-defining.
    visual_label: "ATL '17"
    source_url: "https://liquipedia.net/counterstrike/ELEAGUE/Major/2017"
  alternatives: []

"11-07":
  primary:
    year: 2021
    headline: "NaVi win the PGL Stockholm Major"
    narrative: |
      Natus Vincere drop a single map across the entire bracket and beat
      G2 in the Stockholm final, giving s1mple his long-awaited first
      Major trophy.
    visual_label: "STO '21"
    source_url: "https://liquipedia.net/counterstrike/PGL/Major/2021/Stockholm"
  alternatives: []

"11-19":
  primary:
    year: 2017
    headline: "SK Gaming close out a record-setting year"
    narrative: |
      The Brazilian SK Gaming roster (FalleN, coldzera, fer, TACO, boltz)
      cap off a 2017 in which coldzera won HLTV Player of the Year for
      the second straight season.
    visual_label: "SK '17"
    source_url: "https://liquipedia.net/counterstrike/SK_Gaming"
  alternatives: []

"12-09":
  primary:
    year: 2018
    headline: "coldzera takes a third top-20 podium"
    narrative: |
      HLTV's end-of-year ranking confirms coldzera in the top three for
      the third year running, the first player to ever do so and a
      benchmark s1mple would later chase down.
    visual_label: "HLTV '18"
    source_url: "https://www.hltv.org/news/26602/top-20-players-of-2018-coldzera-3"
  alternatives: []

"02-11":
  primary:
    year: 2024
    headline: "Spirit win IEM Katowice 2024"
    narrative: |
      Team Spirit defeat FaZe Clan 3–0 in the IEM Katowice 2024 grand final to
      capture the Intel Extreme Masters championship. Spirit won
      13–9 on Nuke, 13–11 on Mirage and 13–3 on Overpass for a dominant victory
      .
    visual_label: "KAT '24"
    source_url: "https://www.hltv.org/news/38187/spirit-enter-intel-grand-slam-season-5-race-with-iem-katowice-victory"
  alternatives: []

"02-17":
  primary:
    year: 2016
    headline: "Valve launches CS:GO Operation Wildfire"
    narrative: |
      Valve rolls out Operation Wildfire for CS:GO on Feb 17, 2016. The
      event adds seven community-made maps (Tulip, Cruise, Coast, Empire and a
      revamped Nuke) to the game, and a $6 Wildfire Access Pass
      unlocks new mission campaigns and a special Wildfire coin.
    visual_label: "WLD '16"
    source_url: "https://www.pcgamer.com/operation-wildfire-comes-to-csgo/"
  alternatives: []

"02-21":
  primary:
    year: 2014
    headline: "Valve launches CS:GO Operation Phoenix"
    narrative: |
      Valve releases the Operation Phoenix update for CS:GO on February 21, 2014.
      The update adds eight community maps (including de_cache, de_overpass and others)
      to matchmaking and provides an Operation Phoenix Coin and a new weapon case with
      13 community-created skins.
    visual_label: "PHX '14"
    source_url: "https://www.hltv.org/news/12076/operation-phoenix-launched"
  alternatives: []

"04-25":
  primary:
    year: 2013
    headline: "Valve launches CS:GO Operation Payback"
    narrative: |
      Valve releases Operation Payback for CS:GO on April 25, 2013. The
      operation offers a Classic Casual map group of seven top-voted community
      maps, accessible via a limited-time pass (half-price at launch) that also grants
      an upgradable challenge coin to track matches.
    visual_label: "PAY '13"
    source_url: "https://blog.counter-strike.net/2013/04/6907/"
  alternatives: []

"05-24":
  primary:
    year: 2017
    headline: "Valve launches CS:GO Operation Hydra"
    narrative: |
      Valve releases an update on May 24, 2017, introducing Operation Hydra for
      CS:GO. Hydra adds new weekly game modes (War Games,
      Wingman, Weapons Expert) and includes weapon balance tweaks such as a
      nerf to the UMP45.
    visual_label: "HYD '17"
    source_url: "https://www.hltv.org/news/20546/new-update-changes-the-ump45"
  alternatives: []

"05-27":
  primary:
    year: 2015
    headline: "Valve launches CS:GO Operation Bloodhound"
    narrative: |
      Valve releases CS:GO’s Operation Bloodhound in a May 27, 2015 update.
      The operation adds six community maps (Agency, Resort, Zoo, Log, Rails and
      Season) to official matchmaking and introduces new mission campaigns,
      weapon skins and the Falchion Case with a new knife.
    visual_label: "BLO '15"
    source_url: "https://www.hltv.org/news/15049/operation-bloodhound-in-new-update"
  alternatives: []

"07-02":
  primary:
    year: 2014
    headline: "Valve launches CS:GO Operation Breakout"
    narrative: |
      Valve releases the Operation Breakout update for CS:GO on July 2, 2014.
      The update adds six community maps (Castle, Overgrown, Black Gold, Mist, Rush,
      Insertion) to official matchmaking and introduces 45 new weapon finishes and an
      Operation Breakout case drop.
    visual_label: "BRK '14"
    source_url: "https://www.hltv.org/news/12727/cz-nerf-new-operation-in-update"
  alternatives: []

"08-21":
  primary:
    year: 2012
    headline: "Counter-Strike: Global Offensive is released"
    narrative: |
      Valve and Hidden Path release Counter-Strike: Global Offensive on August 21,
      2012. The launch marked a new era for the franchise, bringing
      CS to new platforms and the updated Source engine after months of beta testing.
    visual_label: "GO '12"
    source_url: "https://www.hltv.org/news/34381/csgo10-a-successor-to-the-counter-strike-franchise-arrives-2012"
  alternatives: []

"09-19":
  primary:
    year: 2013
    headline: "Valve launches CS:GO Operation Bravo"
    narrative: |
      Valve releases the Operation Bravo update for CS:GO on September 19, 2013.
      The update adds eight community-voted maps (Agency, Ali, Cache, Chinatown, Gwalior,
      Ruins, Siege and the returning Seaside) and introduces a challenge coin and new
      weapon finish collections via timed drops.
    visual_label: "BRV '13"
    source_url: "https://blog.counter-strike.net/2013/09/7647/"
  alternatives: []

"10-07":
  primary:
    year: 2004
    headline: "Counter-Strike: Source is released"
    narrative: |
      Valve and Turtle Rock release Counter-Strike: Source on October 7, 2004.
      The game is a Source-engine remake of Counter-Strike, bringing the classic shooter
      to PC, Mac, and Linux platforms.
    visual_label: "CSS '04"
    source_url: "https://www.gamespot.com/games/counter-strike-source/"
  alternatives: []

"11-01":
  primary:
    year: 2015
    headline: "EnVyUs win CS:GO's seventh Major"
    narrative: |
      Team EnVyUs defeat Natus Vincere 2–0 (16–14, 16–5) in the DreamHack Open
      Cluj-Napoca 2015 grand final to claim CS:GO’s seventh Major title.
      The French squad took map one 16–14 on Train and map two 16–5 on Cobblestone,
      earning the US$100,000 champion’s prize.
    visual_label: "CLJ '15"
    source_url: "https://www.hltv.org/news/16287/envyus-win-csgos-seventh-major"
  alternatives: []

"11-09":
  primary:
    year: 2000
    headline: "Counter-Strike 1.0 is released"
    narrative: |
      Valve and Sierra announce the official release of Counter-Strike version 1.0 on
      November 9, 2000. After more than a year in beta, the full game is now
      complete and the retail Half-Life: Counter-Strike edition has gone gold.
    visual_label: "CS1.0"
    source_url: "https://www.gamespot.com/articles/counter-strike-10-released/1100-2652037/"
  alternatives: []

"11-12":
  primary:
    year: 2014
    headline: "Valve launches CS:GO Operation Vanguard"
    narrative: |
      Valve releases the Operation Vanguard update for CS:GO on November 12, 2014.
      The update adds six community maps (de_marquis, de_facade, de_season, de_bazaar,
      cs_workout, cs_backalley) and new mission campaigns, along with exclusive
      Vanguard weapon cases and challenge coins for pass holders.
    visual_label: "VNG '14"
    source_url: "https://www.hltv.org/news/13600/operation-vanguard-begins"
  alternatives: []

"12-01":
  primary:
    year: 2013
    headline: "Fnatic win DreamHack Winter 2013"
    narrative: |
      Fnatic defeat Ninjas in Pyjamas 2–1 (16–14, 6–16, 16–2) in the DreamHack Winter
      2013 grand final. The Swedish team claim the $100,000 champion’s prize
      and the title of the biggest Counter-Strike tournament to date.
    visual_label: "DHW '13"
    source_url: "https://www.hltv.org/news/11814/fnatic-win-dreamhack-winter-2013"
  alternatives: []
