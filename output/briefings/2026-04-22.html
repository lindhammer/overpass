<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CS2 Briefing – April 22, 2026</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #0a0a0f;
        color: #b8b8c8;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", sans-serif;
        font-size: 15px;
        line-height: 1.5;
        max-width: 680px;
        margin: 0 auto;
        padding: 0 16px 56px;
      }

      a {
        color: inherit;
        text-decoration: none;
      }
      a:hover {
        color: #de9b35;
      }

      /* ── Header ─────────────────────────────────────────────── */
      .header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        padding: 20px 0 14px;
        border-bottom: 1px solid #1a1a26;
      }

      .header-logo {
        font-size: 13px;
        font-weight: 800;
        color: #de9b35;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        flex-shrink: 0;
      }

      .header-meta {
        font-size: 11px;
        color: #44445a;
        text-align: right;
        line-height: 1.4;
      }

      /* ── Hero summary ────────────────────────────────────────── */
      .summary {
        padding: 24px 0 20px;
        border-bottom: 1px solid #1a1a26;
        margin-bottom: 36px;
      }

      .summary-label {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #de9b35;
        margin-bottom: 10px;
      }

      .summary-text {
        font-size: 19px;
        font-weight: 600;
        color: #e4e4f0;
        line-height: 1.35;
      }

      /* ── Section ─────────────────────────────────────────────── */
      .section {
        margin-bottom: 44px;
      }

      .section-heading {
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: #de9b35;
        margin-bottom: 6px;
        padding-bottom: 8px;
        border-bottom: 1px solid #1a1a26;
      }

      .section-intro {
        font-size: 13px;
        color: #6a6a88;
        font-style: italic;
        margin-bottom: 16px;
        margin-top: 10px;
      }

      /* ── Cards (base) ────────────────────────────────────────── */
      .card {
        background: #111119;
        border: 1px solid #1e1e2e;
        border-radius: 6px;
        margin-bottom: 10px;
        overflow: hidden;
      }

      .card-body {
        padding: 14px 16px;
      }

      /* ── Thumbnail card layout ───────────────────────────────── */
      .card-row {
        display: flex;
        align-items: stretch;
      }

      .card-thumb {
        flex: 0 0 112px;
        width: 112px;
        background: #16161f;
      }

      .card-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        min-height: 68px;
      }

      .card-thumb-placeholder {
        width: 100%;
        min-height: 68px;
        height: 100%;
        background: #16161f;
      }

      .card-content {
        flex: 1;
        padding: 12px 14px;
        min-width: 0;
      }

      /* ── Card elements ───────────────────────────────────────── */
      .card-source {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: #de9b35;
        margin-bottom: 5px;
      }

      .card-title {
        font-size: 14px;
        font-weight: 600;
        color: #dcdce8;
        line-height: 1.35;
        margin-bottom: 8px;
      }

      .card-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        font-size: 12px;
        color: #4a4a62;
      }

      .card-meta-score::before {
        content: "▲ ";
      }

      .card-excerpt {
        font-size: 13px;
        color: #707085;
        margin-top: 10px;
        line-height: 1.45;
        padding-top: 10px;
        border-top: 1px solid #1a1a26;
      }

      .card-detail-group + .card-detail-group {
        margin-top: 10px;
      }

      .card-detail-label {
        color: #d2d2df;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .card-detail-line + .card-detail-line {
        margin-top: 4px;
      }

      /* ── Footer ─────────────────────────────────────────────── */
      .footer {
        border-top: 1px solid #1a1a26;
        padding-top: 14px;
        margin-top: 40px;
        font-size: 11px;
        color: #35354a;
        text-align: center;
      }

      /* ── Responsive ─────────────────────────────────────────── */
      @media (max-width: 440px) {
        .card-thumb {
          flex: 0 0 88px;
          width: 88px;
        }
        .summary-text {
          font-size: 16px;
        }
        .card-title {
          font-size: 13px;
        }
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="header-logo">Overpass</div>
      <div class="header-meta">
        Wednesday, 22 April 2026<br />
        Generated 20:29
      </div>
    </header>

    <div class="summary">
      <div class="summary-label">Today's Briefing</div>
      <div class="summary-text">No items collected today.</div>
    </div>

                

    <div class="footer">
      Overpass CS2 Briefing &middot; 2026-04-22
    </div>
  </body>
</html>
